<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- make skeleton layout -->
    <div id="wrapper">
      <div id="search-section">
        <div id="search-box">
          <form id="search-input-box" onsubmit="event.preventDefault();">
            <div id="icon">aa</div>
            <input
              id="search-input"
              type="text"
              placeholder="Search books, author, category, catalog code..."
            />
            <button id="search-button">Search</button>
          </form>
        </div>
        <!-- <hr /> -->
        <div id="search-results">
          <h2>Search Results for "potter"</h2>
          <p>34 results found</p>
        </div>
      </div>
      <!--  -->
      <div id="main">
        <aside id="filter">
          <h3>Refine Results</h3>
          <!-- Availbility -->
          <section>
            <div>
              <div>
                <h3>Availbility</h3>
                <ul id="availbility"></ul>
              </div>
              <!-- Location -->
              <div>
                <h3>Location</h3>
                <ul id="location"></ul>
              </div>
              <!-- Category -->
              <div>
                <h3>Category</h3>
                <ul id="category"></ul>
              </div>
            </div>
          </section>

          <button id="refined-search-button">Apply</button>
        </aside>
        <main>
          <div id="bookList">
            <!-- add all books here -->
          </div>
          <div id="pagination">
            <ul id="paginationParent">
              <!-- add all books pagination here -->
            </ul>
          </div>
        </main>
      </div>
    </div>
    <!--  -->
    <!-- </div> -->
  </body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.31/dist/flexsearch.bundle.min.js"></script> -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/FlexSearch/0.7.31/flexsearch.bundle.min.js"></script>
  <script type="module" src="app.js"></script>
</html>
